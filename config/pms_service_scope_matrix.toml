# PMS service scope matrix.
#
# This file contains no secrets. It documents which entity levels can carry
# config values for each PMS service. The runtime resolver should use this
# matrix before trying to resolve an effective value for a BUID/office/room.
#
# Levels:
# - BU: business-unit/BUID-level property
# - OFFICE: office-level override under a BUID
# - ROOM: room-level override under an office; currently applicable only to
#   MEETING_ROOMS according to the known CMS behavior.
# - ROLE: role-specific criteria observed for Project Management Service
#   properties. Treat as a special criteria, not a physical hierarchy level.

[PROJECT-MANAGEMENT-SERVICE]
canonical_service_id = "PROJECT-MANAGEMENT-SERVICE"
aliases = ["PROJECT-MANAGEMENT-SERVICES", "PMS", "1. PMS"]
levels = ["BU"]
criteria = ["BUID", "ROLE"]
observed_role_values = ["cd210644-153b-4a57-aa48-5e7213a5da66", "employee", "RECEPTIONIST"]
notes = "Navigation/module enablement and project-management service properties. Some properties use ROLE as customization criteria; confirm per-property criteriaPriorityList."

[MEETING_ROOMS]
canonical_service_id = "MEETING_ROOMS"
aliases = ["MEETING ROOMS", "3. Meeting Rooms"]
levels = ["BU", "OFFICE", "ROOM"]
criteria = ["BUID", "OFFICEID", "ROOMID"]
notes = "Meeting room configs can vary by BUID, office, and room."

[VISITOR]
canonical_service_id = "VISITOR"
aliases = ["VMS", "Visitor Mgmt", "2. VMS", "2. Visitor Mgmt"]
