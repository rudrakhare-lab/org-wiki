# allowed_users.toml — Phase 1 auth (replace with SSO in Phase 5)
# Tokens are SHA256(email) truncated to 32 chars — admin issues them manually.
# Roles: viewer, contributor, pms_debug, admin
#
# expires_at (optional) — ISO date string (YYYY-MM-DD). Token rejected after this date.
# Omit for no-expiry (recommended for admin accounts only).
# Example: expires_at = "2026-12-31"

[users]

[users.admin]
email = "rudra.khare@moveinsync.com"
role = "admin"
